<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Borne Systems - Call Queue</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    h1 { color: #333; }
    .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .lead { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid #667eea; }
    .lead.no-website { border-left-color: #dc3545; }
    .lead.called { border-left-color: #28a745; opacity: 0.7; }
    .lead-header { display: flex; justify-content: space-between; align-items: center; }
    .lead-name { font-weight: bold; font-size: 18px; }
    .lead-industry { background: #e9ecef; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .lead-details { font-size: 14px; color: #666; margin: 8px 0; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn-call { background: #667eea; color: white; }
    .btn-call:hover { background: #5568d3; }
    .btn-remove { background: #dc3545; color: white; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .badge-new { background: #d4edda; color: #155724; }
    .badge-called { background: #cce5ff; color: #004085; }
    .stats { display: flex; gap: 20px; }
    .stat { text-align: center; }
    .stat-num { font-size: 24px; font-weight: bold; }
    .stat-label { font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <h1>📞 Call Queue - VAPI Outreach</h1>
  
  <div class="card">
    <h3>Quick Stats</h3>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="total">0</div>
        <div class="stat-label">Total Leads</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="to_call">0</div>
        <div class="stat-label">To Call</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="called">0</div>
        <div class="stat-label">Called</div>
      </div>
    </div>
  </div>
  
  <div class="card">
    <h3>Leads to Call (No Website)</h3>
    <div id="leadList"></div>
  </div>
  
  <div class="card">
    <h3>Called</h3>
    <div id="calledList"></div>
  </div>
  
  <script>
    let leads = JSON.parse(localStorage.getItem('borne_leads') || '[]');
    
    function render() {
      const toCall = leads.filter(l => !l.called && l.has_website === 'No');
      const called = leads.filter(l => l.called);
      
      document.getElementById('total').textContent = leads.length;
      document.getElementById('to_call').textContent = toCall.length;
      document.getElementById('called').textContent = called.length;
      
      document.getElementById('leadList').innerHTML = toCall.map(lead => `
        <div class="lead no-website">
          <div class="lead-header">
            <div>
              <span class="lead-name">${lead.business_name}</span>
              <span class="lead-industry">${lead.industry}</span>
            </div>
            <span class="badge badge-new">To Call</span>
          </div>
          <div class="lead-details">
            📍 ${lead.area}<br>
            📞 ${lead.phone || 'No phone'}<br>
            👤 ${lead.owner_name || 'Unknown'}
          </div>
          <button class="btn btn-call" onclick="markCalled(${lead.id})">✓ Mark as Called</button>
        </div>
      `).join('');
      
      document.getElementById('calledList').innerHTML = called.map(lead => `
        <div class="lead called">
          <div class="lead-header">
            <span class="lead-name">${lead.business_name}</span>
            <span class="badge badge-called">Called</span>
          </div>
          <div class="lead-details">
            📍 ${lead.area}<br>
            📞 ${lead.phone || 'No phone'}
          </div>
        </div>
      `).join('');
    }
    
    function markCalled(id) {
      leads = leads.map(l => l.id === id ? {...l, called: true} : l);
      localStorage.setItem('borne_leads', JSON.stringify(leads));
      render();
    }
    
    render();
  </script>
</body>
</html>
